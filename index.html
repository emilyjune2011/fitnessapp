<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness App | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell auth-shell">
      <header class="hero card">
        <p class="eyebrow">Fitness App</p>
        <h1>Log In</h1>
        <p>Access your dashboard to view stats and log workouts.</p>
      </header>

      <section class="card auth-card" aria-labelledby="login-heading">
        <h2 id="login-heading">Welcome Back</h2>
        <form id="simple-login-form" class="profile-form" novalidate>
          <label>Email
            <input name="email" type="email" autocomplete="email" required aria-required="true" />
          </label>
          <label>Password
            <input name="password" type="password" required aria-required="true" />
          </label>
          <button class="btn btn-primary" type="submit">Log In</button>
        </form>
        <p class="inline-alert" id="login-message" aria-live="polite" hidden></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
