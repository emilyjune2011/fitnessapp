<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness App | Add User</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>Add New Profile</h1>
        <p>Create a client profile and add it to established users.</p>
      </header>

      <section class="card" aria-labelledby="form-heading">
        <div class="users-header">
          <h2 id="form-heading">Profile Details</h2>
          <a class="secondary-link" href="users.html">Back to Users</a>
        </div>

        <form id="new-profile-form" class="profile-form">
          <label>First name<input name="firstName" required /></label>
          <label>Last name<input name="lastName" required /></label>
          <label>Phone number<input name="phone" type="tel" required /></label>
          <label>Email<input name="email" type="email" required /></label>
          <label>Age<input name="age" type="number" min="1" required /></label>
          <label>Birthday<input name="birthday" type="date" required /></label>
          <label class="full-width">Goals<textarea name="goals" rows="3" required></textarea></label>
          <button class="primary-action" type="submit">Create Profile</button>
        </form>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
