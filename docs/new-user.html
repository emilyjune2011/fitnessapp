<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness App | Add User</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero card">
        <h1>Add New Profile</h1>
        <p>Create a client profile for trainer and user access.</p>
      </header>

      <section class="card" aria-labelledby="form-heading">
        <div class="users-header">
          <h2 id="form-heading">Profile Details</h2>
          <a class="btn btn-ghost" href="users.html">Back to Users</a>
        </div>

        <form id="new-profile-form" class="profile-form" novalidate>
          <label>First name *<input name="firstName" required aria-required="true" /></label>
          <label>Last name *<input name="lastName" required aria-required="true" /></label>
          <label>Email *<input name="email" type="email" required aria-required="true" /></label>
          <label>Phone number<input name="phone" type="tel" /></label>
          <label>Age *<input name="age" type="number" min="1" required aria-required="true" /></label>
          <label>Birthday<input name="birthday" type="date" /></label>
          <label class="full-width">Goals *<textarea name="goals" rows="3" required aria-required="true"></textarea></label>
          <label class="full-width">Restrictions<textarea name="restrictions" rows="2" placeholder="Ex: Knee pain, no heavy overhead lifts"></textarea></label>
          <button class="btn btn-primary" type="submit">Create Profile</button>
        </form>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
